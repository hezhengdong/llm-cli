name: llm-cli CI/CD

on:
  push:
    branches:
      - '**' # 拦截所有分支的 push，执行检查
    tags:
      - 'v*' # 只有打 v 开头的 tag（如 v1.0.0）才会触发 Release 发布

jobs:
  # 任务 1：静态检查与风格检查 (每次 Push 都会执行)
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # 请根据你的项目要求修改 Go 版本

      - name: Run go fmt
        # 如果存在未格式化的代码，会打印出来并以状态码 1 退出，从而阻断 CI
        run: |
          if [ -n "$(go fmt ./...)" ]; then
            echo "代码风格检查不通过，请在本地运行 'go fmt ./...' 后重新提交"
            exit 1
          fi

      - name: Run go vet
        # 执行静态代码检查
        run: go vet ./...

  # 任务 2：跨平台编译与发布 (只有打 Tag 才会执行)
  release:
    needs: check # 依赖 check 任务成功
    if: startsWith(github.ref, 'refs/tags/v') # 仅在 Tag 推送时触发
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 定义需要编译的系统和架构组合
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build executable
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0 # 禁用 CGO 以保证跨平台二进制文件的绝对静态兼容
        run: |
          go build -ldflags="-s -w" -o llm-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: llm-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
        env:
          # GitHub 会自动提供该 Token 权限
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}