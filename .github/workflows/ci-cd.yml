name: llm-cli CI/CD

on:
  push:
    branches:
      - '**' # 拦截所有分支的 push，执行检查
    tags:
      - 'v*' # 只有打 v 开头的 tag（如 v1.0.0）才会触发 Release 发布

jobs:
  # 任务 1：静态检查与风格检查 (每次 Push 都会执行)
  check:
    runs-on: ubuntu-latest
    steps:
      # 检出项目代码
      - name: Checkout code
        uses: actions/checkout@v5
      # 设置 Go 环境
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable' # 请根据项目要求修改 Go 版本

      # 依赖检查
      - name: Run go mod tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum

      # 代码风格检查
      - name: Run go fmt
        # 如果存在未格式化的代码，会打印出来并以状态码 1 退出，从而阻断 CI
        run: |
          if [ -n "$(go fmt ./...)" ]; then
            echo "代码风格检查不通过，请在本地运行 'go fmt ./...' 后重新提交"
            exit 1
          fi

      # 静态检查
      - name: Run go vet
        # 执行静态代码检查
        run: go vet ./...

  # 任务 2：跨平台编译（只构建，不发布） (只有打 Tag 才会执行)
  build:
    needs: check
    if: startsWith(github.ref, 'refs/tags/v') # 仅在 Tag 推送时触发
    runs-on: ubuntu-latest
    permissions:
      contents: read  # 构建只需要 read
    # 定义需要编译的系统和架构组合
    # 如果是命令行方式，如下所示：
    # CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ${APP_NAME}-linux-amd64
    # CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -o ${APP_NAME}-darwin-amd64
    # CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o ${APP_NAME}-darwin-arm64
    # CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o ${APP_NAME}-windows-amd64.exe
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      # 编译多平台可执行文件
      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0 # 禁用 CGO 以保证跨平台二进制文件的绝对静态兼容
        run: |
          go build -ldflags="-s -w" -o llm-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} .

      # 上传编译产物至 GitHub Actions 临时存储
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          # 为不同平台/架构的编译产物设置唯一名称，避免冲突
          name: llm-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          # 指定需要上传的编译生成的二进制文件路径
          path: llm-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          # 未找到目标文件时终止任务，确保编译流程无异常
          if-no-files-found: error

  # 任务 3：创建 Release 并上传所有文件（只执行一次）
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 必须有 write 权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # 下载所有平台的编译产物，用于发布
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          # 指定产物下载的目标根目录
          path: ./artifacts
          # 合并所有矩阵构建生成的产物至同一目录，简化文件管理
          merge-multiple: true   # 把所有 matrix 的 artifact 合并到一个文件夹

      # 创建 Github Release 并上传文件
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2   # 改成 v2
        with:
          files: ./artifacts/**                  # 一次性上传所有二进制
          generate_release_notes: true           # 自动生成 changelog（推荐）
          draft: false
          prerelease: false
          # 可以加 body: ${{ steps.changelog.outputs.content }} 如果你有自定义 changelog
        env:
          # GitHub 会自动提供该 Token 权限
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# 编译和发布必须解耦，这是跨平台 CI/CD 的标准范式：
# - 并行编译：用 matrix 同时编译所有平台，产物上传到 GitHub Actions 临时存储（artifacts）
# - 串行发布：编译全部成功后，单任务下载所有产物，一次性创建 Release 并上传所有文件

# 反面示例：
# 因为 1. strategy.matrix 会为每个配置项创建独立的并行任务
# 2. 每个并行任务都会去请求创建同一个 Release，只有一个能够成功
# 所以如果 4 个并行任务同时请求创建同一个 Release，会产生竞争条件，导致只有一个能够成功