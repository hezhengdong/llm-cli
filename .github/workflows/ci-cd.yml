name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ] # 监听 v 开头的 tag，例如 v1.0.0
  pull_request:
    branches: [ "main" ]

jobs:
  check:
    name: Lint and Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # 请替换为你实际使用的 Go 版本

      - name: Check formatting (go fmt)
        # 如果存在未格式化的文件，命令会输出文件名并以非 0 状态退出，从而拦截 CI
        run: if [ -n "$(gofmt -l .)" ]; then echo "存在未格式化的代码，请在本地运行 go fmt ./..."; exit 1; fi

      - name: Run go vet
        run: go vet ./...

      - name: Test Build
        run: go build -v ./...

  release:
    name: Build and Release
    needs: check
    if: startsWith(github.ref, 'refs/tags/v') # 仅在 tag 推送时执行
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            name: llm-cli-linux-amd64
          - os: darwin
            arch: amd64
            name: llm-cli-darwin-amd64
          - os: darwin
            arch: arm64
            name: llm-cli-darwin-arm64
          - os: windows
            arch: amd64
            name: llm-cli-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: go build -o build/${{ matrix.name }} .

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/${{ matrix.name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}