# 工作流名称
name: Go CI/CD Pipeline

# 触发条件：
# 1. 所有分支的 push 代码
# 2. 推送 语义化版本tag（如 v1.0.0、v2.1.3）
on:
  push:
    branches: [ "*" ]
    tags: [ "v*.*.*" ]

# 给工作流授权：允许创建 Release 和上传文件
permissions:
  contents: write

# 构建任务
jobs:
  build:
    # 运行环境：最新版 Ubuntu
    runs-on: ubuntu-latest
    steps:
      # 步骤1：检出项目代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：设置 Go 环境（版本与你的 go.mod 保持一致，如 1.21/1.22）
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
          cache-dependency-path: go.sum

      # 步骤3：缓存 Go 依赖（加速构建）
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('go.mod') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # 步骤4：下载项目依赖
      - name: Download dependencies
        run: go mod download

      # 步骤5：静态检查 (go vet ./...)
      - name: Run go vet
        run: go vet ./...

      # 步骤6：代码风格检查 (go fmt ./...)
      # 若代码未格式化，CI 直接报错
      - name: Check go fmt
        run: |
          if [ -n "$(go fmt ./...)" ]; then
            echo "❌ 代码未格式化，请本地执行：go fmt ./..."
            exit 1
          fi

      # 步骤7：编译多平台可执行文件（Linux/Mac/Windows）
      - name: Build binaries
        run: |
          # 项目名称
          APP_NAME="llm"
          # 编译 Linux amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ${APP_NAME}-linux-amd64
          # 编译 Mac amd64
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -o ${APP_NAME}-darwin-amd64
          # 编译 Windows amd64
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o ${APP_NAME}-windows-amd64.exe

      # 步骤8：仅当推送 TAG 时，创建 GitHub Release 并上传文件
      - name: Create Release and Upload Assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # Release 标题：使用 TAG 名称
          name: Release ${{ github.ref_name }}
          # 自动生成 Release 笔记
          generate_release_notes: true
          # 上传的文件：编译的二进制 + 安装脚本
          files: |
            llm-*
            install.sh